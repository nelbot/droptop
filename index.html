<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>DropTop</title>
<meta name="description" content="Should I drop the top right now? A weather app for convertible owners.">

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0c0e">

<!-- Apple PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DropTop">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

<!-- Favicon -->
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png">

<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0e;
    --surface: #12161a;
    --surface-raised: #1a1f25;
    --border: #252b33;
    --text: #e8e6e1;
    --text-muted: #7a8190;
    --text-dim: #4a5060;
    --green: #3dd68c;
    --green-glow: rgba(61, 214, 140, 0.15);
    --yellow: #f0c946;
    --yellow-glow: rgba(240, 201, 70, 0.15);
    --red: #e85454;
    --red-glow: rgba(232, 84, 84, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 24px 20px 40px;
    min-height: 100vh;
    min-height: 100dvh;
  }

  /* ── Install banner ── */
  .install-banner {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 20px;
    display: none;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .install-banner.show { display: flex; }

  .install-banner-text {
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .install-banner-text strong { color: var(--text); font-weight: 500; }

  .install-btn {
    background: var(--green);
    color: var(--bg);
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .install-dismiss {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 16px;
    cursor: pointer;
    padding: 4px;
    flex-shrink: 0;
  }

  /* ── Header ── */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 32px;
  }

  .brand {
    font-family: 'Instrument Serif', serif;
    font-size: 22px;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  .brand span {
    color: var(--text-dim);
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    display: block;
    margin-top: 2px;
  }

  .location {
    text-align: right;
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.6;
  }

  .location-name { color: var(--text); font-weight: 500; }

  /* ── Gauge ── */
  .gauge-section {
    text-align: center;
    margin-bottom: 40px;
  }

  .verdict-label {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 16px;
  }

  .gauge-ring {
    position: relative;
    width: 220px;
    height: 220px;
    margin: 0 auto 20px;
  }

  .gauge-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .gauge-bg { fill: none; stroke: var(--border); stroke-width: 6; }

  .gauge-fill {
    fill: none;
    stroke-width: 6;
    stroke-linecap: round;
    stroke-dasharray: 565.48;
    stroke-dashoffset: 565.48;
    transition: stroke-dashoffset 1.5s cubic-bezier(0.16, 1, 0.3, 1), stroke 0.5s ease;
  }

  .gauge-inner {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }

  .gauge-verdict {
    font-family: 'Instrument Serif', serif;
    font-size: 28px;
    margin-bottom: 4px;
  }

  .gauge-score {
    font-size: 42px;
    font-weight: 300;
    letter-spacing: -0.03em;
    line-height: 1;
    margin-bottom: 2px;
  }

  .gauge-unit {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .gauge-subtitle {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* ── Conditions ── */
  .conditions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 32px;
  }

  .condition-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    transition: border-color 0.3s ease;
  }

  .condition-card.warn { border-color: rgba(240, 201, 70, 0.3); }
  .condition-card.bad { border-color: rgba(232, 84, 84, 0.3); }

  .condition-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .condition-label .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
  }

  .condition-card.warn .dot { background: var(--yellow); }
  .condition-card.bad .dot { background: var(--red); }

  .condition-value {
    font-size: 22px;
    font-weight: 300;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .condition-detail {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* ── Window alert ── */
  .window-alert {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .window-alert-icon { font-size: 28px; flex-shrink: 0; }

  .window-alert-text {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.6;
  }

  .window-alert-text strong { color: var(--text); font-weight: 500; }
  .hl-green { color: var(--green); font-weight: 500; }
  .hl-yellow { color: var(--yellow); font-weight: 500; }

  /* ── Timeline ── */
  .timeline-section { margin-bottom: 32px; }

  .section-header {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 14px;
    padding-left: 2px;
  }

  .timeline {
    display: flex;
    overflow-x: auto;
    padding-bottom: 8px;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }

  .timeline::-webkit-scrollbar { display: none; }

  .hour-block {
    flex: 0 0 auto;
    width: 52px;
    text-align: center;
    padding: 12px 4px;
    border-radius: 8px;
  }

  .hour-block.now { background: var(--surface); }

  .hour-time {
    font-size: 10px;
    color: var(--text-dim);
    margin-bottom: 10px;
    letter-spacing: 0.05em;
  }

  .hour-bar-wrap {
    width: 4px; height: 48px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 10px;
    position: relative;
    overflow: hidden;
  }

  .hour-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    border-radius: 2px;
    height: 0;
    transition: height 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .hour-temp { font-size: 11px; color: var(--text-muted); }
  .hour-icon { font-size: 14px; margin-bottom: 4px; line-height: 1; }

  /* ── Thresholds ── */
  .thresholds { margin-bottom: 24px; }

  .threshold-row {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 12px;
  }

  .threshold-row:last-child { border-bottom: none; }
  .threshold-key { color: var(--text-muted); }
  .threshold-val { color: var(--text-dim); }

  /* ── Refresh ── */
  .refresh-bar {
    text-align: center;
    margin-bottom: 20px;
  }

  .refresh-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 8px 20px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    letter-spacing: 0.05em;
  }

  .refresh-btn:hover, .refresh-btn:active {
    background: var(--surface-raised);
    color: var(--text);
  }

  /* ── Footer ── */
  .footer {
    text-align: center;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding-top: 16px;
    border-top: 1px solid rgba(255,255,255,0.04);
    line-height: 2.2;
  }

  /* ── Loading ── */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    gap: 16px;
  }

  .loading-spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--text-muted);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }

  .loading-brand {
    font-family: 'Instrument Serif', serif;
    font-size: 24px;
    color: var(--text);
    margin-bottom: 24px;
  }

  /* ── Error ── */
  .error-state { text-align: center; padding: 60px 20px; }

  .error-state p {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.7;
    margin-bottom: 16px;
  }

  .retry-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 10px 24px;
    border-radius: 6px;
    cursor: pointer;
  }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .anim { animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
  .d1 { animation-delay: 0.1s; }
  .d2 { animation-delay: 0.2s; }
  .d3 { animation-delay: 0.35s; }
  .d4 { animation-delay: 0.5s; }
  .d5 { animation-delay: 0.65s; }
</style>
</head>
<body>

<div class="app" id="app">
  <div class="loading">
    <div class="loading-brand">DropTop</div>
    <div class="loading-spinner"></div>
    <div class="loading-text">Reading the sky...</div>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────
const CONFIG = {
  lat: 25.6351,
  lon: -80.3453,
  locationName: 'Kendale Lakes, FL',
  car: '2025 MX-5 Miata Club',
  thresholds: {
    temp:     { min: 65, max: 95 },
    rain:     { max: 20 },
    wind:     { max: 25 },
    uv:       { max: 8 },
    humidity: { max: 85 },
  }
};

// ── SERVICE WORKER ──────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}

// ── INSTALL PROMPT ──────────────────────────────────────
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  const b = document.getElementById('installBanner');
  if (b) b.classList.add('show');
});

function doInstall() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => {
    deferredPrompt = null;
    const b = document.getElementById('installBanner');
    if (b) b.classList.remove('show');
  });
}

function dismissInstall() {
  const b = document.getElementById('installBanner');
  if (b) b.classList.remove('show');
}

function maybeShowIosHint() {
  const ios = /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
  const standalone = window.navigator.standalone === true;
  if (ios && !standalone) {
    const b = document.getElementById('installBanner');
    if (b) {
      b.querySelector('.install-banner-text').innerHTML =
        'Tap <strong>Share</strong> ↑ then <strong>Add to Home Screen</strong> for the full experience.';
      const btn = b.querySelector('.install-btn');
      if (btn) btn.style.display = 'none';
      b.classList.add('show');
    }
  }
}

// ── WEATHER ─────────────────────────────────────────────
async function fetchWeather() {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${CONFIG.lat}&longitude=${CONFIG.lon}&hourly=temperature_2m,relative_humidity_2m,precipitation_probability,wind_speed_10m,uv_index,weather_code&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=America%2FNew_York&forecast_days=2`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('Failed');
  return res.json();
}

// ── SCORING ─────────────────────────────────────────────
function score(temp, rain, wind, uv, hum) {
  let s = 100;
  const t = CONFIG.thresholds;
  if (temp < t.temp.min) s -= Math.min(40, (t.temp.min - temp) * 3);
  else if (temp > t.temp.max) s -= Math.min(40, (temp - t.temp.max) * 4);
  if (rain > t.rain.max) s -= Math.min(50, (rain - t.rain.max) * 1.5);
  else if (rain > 10) s -= (rain - 10) * 0.5;
  if (wind > t.wind.max) s -= Math.min(30, (wind - t.wind.max) * 2);
  else if (wind > 15) s -= (wind - 15) * 0.5;
  if (uv > t.uv.max) s -= Math.min(15, (uv - t.uv.max) * 3);
  if (hum > t.humidity.max) s -= Math.min(20, (hum - t.humidity.max) * 1.5);
  return Math.max(0, Math.min(100, Math.round(s)));
}

function verdict(s) {
  if (s >= 80) return { text: 'Drop the top', color: 'green' };
  if (s >= 55) return { text: 'Borderline', color: 'yellow' };
  return { text: 'Keep it up', color: 'red' };
}

function status(type, val) {
  const t = CONFIG.thresholds;
  if (type === 'temp') return (val < t.temp.min || val > t.temp.max) ? 'bad' : (val < t.temp.min+5 || val > t.temp.max-5) ? 'warn' : '';
  if (type === 'rain') return val > t.rain.max ? 'bad' : val > 10 ? 'warn' : '';
  if (type === 'wind') return val > t.wind.max ? 'bad' : val > 15 ? 'warn' : '';
  if (type === 'uv') return val > t.uv.max ? 'bad' : val > 6 ? 'warn' : '';
  if (type === 'hum') return val > t.humidity.max ? 'bad' : val > 70 ? 'warn' : '';
  return '';
}

function icon(code) {
  if (code <= 1) return '☀️'; if (code <= 3) return '⛅'; if (code <= 48) return '☁️';
  if (code <= 67) return '🌧️'; if (code <= 77) return '❄️'; if (code <= 82) return '🌧️';
  return '⛈️';
}

function nextWindow(hours) {
  const now = new Date();
  let start = null, end = null;
  for (const h of hours) {
    const d = new Date(h.time);
    if (d < now) continue;
    if (h.score >= 70 && !start) start = d;
    else if (h.score < 70 && start && !end) end = d;
  }
  if (start && !end) end = new Date(hours[hours.length - 1].time);
  return { start, end };
}

function fmt(d) {
  if (!d) return '—';
  let h = d.getHours(); const a = h >= 12 ? 'pm' : 'am';
  return `${h % 12 || 12}${a}`;
}

// ── RENDER ──────────────────────────────────────────────
function render(data) {
  const h = data.hourly;
  const now = new Date();
  const ci = h.time.findIndex(t => {
    const d = new Date(t);
    return d.getHours() === now.getHours() && d.getDate() === now.getDate();
  });
  if (ci === -1) { renderError('Could not match current hour.'); return; }

  const temp = Math.round(h.temperature_2m[ci]);
  const hum = Math.round(h.relative_humidity_2m[ci]);
  const rain = Math.round(h.precipitation_probability[ci]);
  const wind = Math.round(h.wind_speed_10m[ci]);
  const uv = h.uv_index[ci];
  const sc = score(temp, rain, wind, uv, hum);
  const v = verdict(sc);

  const tl = [];
  for (let i = ci; i < Math.min(ci + 24, h.time.length); i++) {
    tl.push({
      time: h.time[i],
      temp: Math.round(h.temperature_2m[i]),
      score: score(h.temperature_2m[i], h.precipitation_probability[i], h.wind_speed_10m[i], h.uv_index[i], h.relative_humidity_2m[i]),
      code: h.weather_code[i],
    });
  }

  const win = nextWindow(tl);
  const isGood = sc >= 70;
  const winH = win.start && win.end ? Math.round((win.end - win.start) / 3600000) : 0;

  document.getElementById('app').innerHTML = `
    <div class="install-banner" id="installBanner">
      <div class="install-banner-text"><strong>Install DropTop</strong> for the full experience</div>
      <button class="install-btn" onclick="doInstall()">Install</button>
      <button class="install-dismiss" onclick="dismissInstall()">×</button>
    </div>

    <div class="header anim">
      <div class="brand">DropTop<span>for convertible owners</span></div>
      <div class="location">
        <div class="location-name">${CONFIG.locationName}</div>
        <div>${now.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' })}</div>
        <div>${fmt(now)}</div>
      </div>
    </div>

    <div class="gauge-section anim d1">
      <div class="verdict-label">Right now</div>
      <div class="gauge-ring">
        <svg viewBox="0 0 200 200">
          <circle class="gauge-bg" cx="100" cy="100" r="90"/>
          <circle class="gauge-fill" id="gf" cx="100" cy="100" r="90"
            style="stroke:var(--${v.color}); filter:drop-shadow(0 0 8px var(--${v.color}-glow));"/>
        </svg>
        <div class="gauge-inner">
          <div class="gauge-verdict" style="color:var(--${v.color})">${v.text}</div>
          <div class="gauge-score">${sc}</div>
          <div class="gauge-unit">/ 100</div>
        </div>
      </div>
      <div class="gauge-subtitle">${CONFIG.car}</div>
    </div>

    <div class="conditions anim d2">
      <div class="condition-card ${status('temp', temp)}">
        <div class="condition-label"><span class="dot"></span>Temp</div>
        <div class="condition-value">${temp}°F</div>
        <div class="condition-detail">${temp >= CONFIG.thresholds.temp.min && temp <= CONFIG.thresholds.temp.max ? 'In range' : 'Out of range'}</div>
      </div>
      <div class="condition-card ${status('rain', rain)}">
        <div class="condition-label"><span class="dot"></span>Rain</div>
        <div class="condition-value">${rain}%</div>
        <div class="condition-detail">probability</div>
      </div>
      <div class="condition-card ${status('wind', wind)}">
        <div class="condition-label"><span class="dot"></span>Wind</div>
        <div class="condition-value">${wind} mph</div>
        <div class="condition-detail">${wind <= 10 ? 'Calm' : wind <= 20 ? 'Breezy' : 'Strong'}</div>
      </div>
      <div class="condition-card ${status('hum', hum)}">
        <div class="condition-label"><span class="dot"></span>Humidity</div>
        <div class="condition-value">${hum}%</div>
        <div class="condition-detail">${hum <= 60 ? 'Comfortable' : hum <= 75 ? 'Sticky' : 'Swampy'}</div>
      </div>
    </div>

    <div class="window-alert anim d3">
      <div class="window-alert-icon">${isGood ? '🟢' : '⏳'}</div>
      <div class="window-alert-text">
        ${isGood
          ? `You're in a window. <span class="hl-green">${winH}h remaining</span> before conditions shift.`
          : win.start
            ? `Next window at <strong>${fmt(win.start)}</strong> for about <span class="hl-green">${winH}h</span>.`
            : `No windows in the next 24 hours.`
        }
      </div>
    </div>

    <div class="timeline-section anim d4">
      <div class="section-header">Next 24 hours</div>
      <div class="timeline">
        ${tl.map((t, i) => {
          const d = new Date(t.time);
          const c = t.score >= 70 ? 'var(--green)' : t.score >= 50 ? 'var(--yellow)' : 'var(--red)';
          return `<div class="hour-block ${i===0?'now':''}">
            <div class="hour-time">${i===0?'Now':fmt(d)}</div>
            <div class="hour-icon">${icon(t.code)}</div>
            <div class="hour-bar-wrap"><div class="hour-bar" style="background:${c}" data-h="${t.score}"></div></div>
            <div class="hour-temp">${t.temp}°</div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <div class="thresholds anim d5">
      <div class="section-header">Your thresholds</div>
      <div class="threshold-row"><span class="threshold-key">Temperature</span><span class="threshold-val">${CONFIG.thresholds.temp.min}–${CONFIG.thresholds.temp.max}°F</span></div>
      <div class="threshold-row"><span class="threshold-key">Rain probability</span><span class="threshold-val">≤ ${CONFIG.thresholds.rain.max}%</span></div>
      <div class="threshold-row"><span class="threshold-key">Wind speed</span><span class="threshold-val">≤ ${CONFIG.thresholds.wind.max} mph</span></div>
      <div class="threshold-row"><span class="threshold-key">UV index</span><span class="threshold-val">≤ ${CONFIG.thresholds.uv.max}</span></div>
      <div class="threshold-row"><span class="threshold-key">Humidity</span><span class="threshold-val">≤ ${CONFIG.thresholds.humidity.max}%</span></div>
    </div>

    <div class="refresh-bar anim d5">
      <button class="refresh-btn" onclick="init()">↻ Refresh</button>
    </div>

    <div class="footer anim d5">
      DropTop v1.0 · Open-Meteo API<br>
      ${CONFIG.car}
    </div>
  `;

  // Animate gauge
  requestAnimationFrame(() => {
    setTimeout(() => {
      const g = document.getElementById('gf');
      if (g) g.style.strokeDashoffset = 565.48 - (sc / 100) * 565.48;
    }, 300);
  });

  // Animate bars
  requestAnimationFrame(() => {
    setTimeout(() => {
      document.querySelectorAll('.hour-bar').forEach((b, i) => {
        setTimeout(() => { b.style.height = b.dataset.h + '%'; }, i * 30);
      });
    }, 600);
  });

  maybeShowIosHint();
}

function renderError(msg) {
  document.getElementById('app').innerHTML = `
    <div class="header"><div class="brand">DropTop</div></div>
    <div class="error-state">
      <p>${msg || 'Could not load weather data. Check your connection and try again.'}</p>
      <button class="retry-btn" onclick="init()">Retry</button>
    </div>
  `;
}

// ── INIT ────────────────────────────────────────────────
async function init() {
  document.getElementById('app').innerHTML = `
    <div class="loading">
      <div class="loading-brand">DropTop</div>
      <div class="loading-spinner"></div>
      <div class="loading-text">Reading the sky...</div>
    </div>`;
  try {
    const data = await fetchWeather();
    render(data);
  } catch (err) {
    console.error(err);
    renderError();
  }
}

init();
</script>
</body>
</html>
